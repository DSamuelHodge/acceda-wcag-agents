name: ACCEDA CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Type Check ────────────────────────────────────────────────────────────
  build:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

  # ── Deploy playwright-mcp Worker FIRST (main depends on it) ──────────────
  deploy-playwright-mcp:
    name: Deploy → acceda-playwright-mcp
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: packages/acceda-playwright-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Deploy acceda-playwright-mcp
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy main acceda-agents Worker ─────────────────────────────────────
  deploy-prod:
    name: Deploy → acceda-agents (production)
    runs-on: ubuntu-latest
    needs: [build, deploy-playwright-mcp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run D1 migrations
        run: npm run db:migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy acceda-agents
        run: npm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy to Development (develop branch) ───────────────────────────────
  deploy-dev:
    name: Deploy → acceda-agents (development)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run db:migrate:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── ACCEDA Self-Audit on PR ───────────────────────────────────────────────
  accessibility-audit:
    name: ACCEDA Self-Audit
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'pull_request'
    steps:
      - name: Trigger audit
        id: audit
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://acceda-agents-dev.workers.dev/api/audit" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${{ github.event.pull_request.html_url }}\",\"mode\":\"ci\",\"wcagLevel\":\"wcag2aa\"}" \
            || echo '{"auditId":"skipped"}')
          echo "audit_id=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin).get(\"auditId\",\"skipped\"))')" >> $GITHUB_OUTPUT

      - name: Wait and check
        if: steps.audit.outputs.audit_id != 'skipped'
        run: |
          AUDIT_ID="${{ steps.audit.outputs.audit_id }}"
          for i in $(seq 1 24); do
            sleep 10
            STATUS=$(curl -sf "https://acceda-agents-dev.workers.dev/api/audit/$AUDIT_ID" \
              | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("session",{}).get("status","pending"))' 2>/dev/null || echo "pending")
            echo "Status: $STATUS (attempt $i/24)"
            if [ "$STATUS" = "complete" ] || [ "$STATUS" = "failed" ]; then break; fi
          done

      - name: Gate on critical violations
        if: steps.audit.outputs.audit_id != 'skipped'
        run: |
          AUDIT_ID="${{ steps.audit.outputs.audit_id }}"
          CRITICAL=$(curl -sf "https://acceda-agents-dev.workers.dev/api/audit/$AUDIT_ID" \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); print(sum(1 for v in d.get("violations",[]) if v.get("impact")=="critical"))' 2>/dev/null || echo "0")
          echo "Critical violations: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::ACCEDA found $CRITICAL critical violations"
            exit 1
          fi
